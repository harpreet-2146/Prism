services:
  - type: web
    name: prism-python-service
    env: docker
    dockerfilePath: ./python-service/Dockerfile
    dockerContext: ./python-service
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app,https://your-backend.onrender.com
      - key: OUTPUT_DIR
        value: /var/data/outputs
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: TEMP_DIR
        value: /var/data/temp
      - key: MODEL_CACHE_DIR
        value: /var/data/models
    disks:
      - name: prism-python-data
        mountPath: /var/data
        sizeGB: 5

  - type: web
    name: prism-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app
      - key: BASE_URL
        value: https://your-backend.onrender.com
      - key: PYTHON_SERVICE_URL
        value: https://your-python-service.onrender.com
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: EXPORT_TEMP_DIR
        value: /var/data/exports
    disks:
      - name: prism-backend-data
        mountPath: /var/data
        sizeGB: 5
